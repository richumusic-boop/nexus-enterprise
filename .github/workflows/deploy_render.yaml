name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Backend Deploy Hook
        run: |
          echo "Triggering Render backend deployment..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render API response code: $response"
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "❌ Render deploy hook returned unexpected status: $response"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully."
