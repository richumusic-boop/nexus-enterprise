services:
  # Backend Service
  - type: web
    name: nexus-backend-prod
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db-prod
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256

  # Frontend Static Site
  - type: web
    name: nexus-frontend-prod
    runtime: static

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://nexus-backend-prod.onrender.com/api/v1

databases:
  - name: nexus-db-prod